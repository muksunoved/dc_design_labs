!
ip routing
!
interface Loopback0
  ip address 10.0.2.1/32
!

interface Ethernet1
  no switchport
  ip address 10.2.2.0/31
  no shutdown
!

interface Ethernet2
  no switchport
  ip address 10.2.2.2/31
  no shutdown
!

interface Ethernet3
  no switchport
  ip address 10.2.2.4/31
  no shutdown
!

router bgp 65002
  maximum-paths 4

  neighbor 10.2.2.1 remote-as 65101
  neighbor 10.2.2.1 bfd
  neighbor 10.2.2.1 send-community extended

  neighbor 10.2.2.3 remote-as 65102
  neighbor 10.2.2.3 bfd
  neighbor 10.2.2.3 send-community extended

  neighbor 10.2.2.5 remote-as 65103
  neighbor 10.2.2.5 bfd
  neighbor 10.2.2.5 send-community extended

  redistribute connected
  !
  address-family evpn
    neighbor 10.2.2.1 activate
    neighbor 10.2.2.1 next-hop-unchanged
    neighbor 10.2.2.3 activate
    neighbor 10.2.2.3 next-hop-unchanged
    neighbor 10.2.2.5 activate
    neighbor 10.2.2.5 next-hop-unchanged
!



interface Ethernet1
  bfd interval 100 min_rx 100 multiplier 3
!

interface Ethernet2
  bfd interval 100 min_rx 100 multiplier 3
!

interface Ethernet3
  bfd interval 100 min_rx 100 multiplier 3
!
