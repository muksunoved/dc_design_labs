!
ip routing
!
interface Loopback0
  ip address 10.0.11.1/32
!

vlan 10
  name VLAN10_OVERLAY
!

interface Vxlan1
  vxlan source-interface Loopback0
  vxlan udp-port 4789
  vxlan vlan 10 vni 10010
  vxlan learn-restrict any
!

interface Ethernet1
  no switchport
  ip address 10.2.1.1/31
  no shutdown
!

interface Ethernet2
  no switchport
  ip address 10.2.2.1/31
  no shutdown
!

interface Ethernet3
  switchport access vlan 10
  no shutdown
!

router bgp 65101
  maximum-paths 4

  neighbor 10.2.1.0 remote-as 65001
  neighbor 10.2.1.0 bfd
  neighbor 10.2.1.0 send-community extended

  neighbor 10.2.2.0 remote-as 65002
  neighbor 10.2.2.0 bfd
  neighbor 10.2.2.0 send-community extended

  redistribute connected
  !
  vlan 10
    rd 10.0.11.1:10010
    route-target both 10:10010
    redistribute learned
  !
  address-family evpn
    neighbor 10.2.1.0 activate
    neighbor 10.2.2.0 activate
!



interface Ethernet1
  bfd interval 100 min_rx 100 multiplier 3
!

interface Ethernet2
  bfd interval 100 min_rx 100 multiplier 3
!
