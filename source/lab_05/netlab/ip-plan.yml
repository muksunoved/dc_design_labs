# IP Plan — centralized IP address management for eBGP underlay + VXLAN EVPN overlay
# Underlay: eBGP P2P links between spine and leaf
# Overlay: VLAN 10 / VNI 10010 / RT 10:10010 / subnet 192.168.10.0/24
# Each node defines its loopback and its links to peers.
# "local" = IP on this node's interface, "remote" = IP on the peer's interface.

spine1:
  loopback: 10.0.1.1/32
  links:
    leaf1:
      local: 10.2.1.0/31
      remote: 10.2.1.1/31
    leaf2:
      local: 10.2.1.2/31
      remote: 10.2.1.3/31
    leaf3:
      local: 10.2.1.4/31
      remote: 10.2.1.5/31

spine2:
  loopback: 10.0.2.1/32
  links:
    leaf1:
      local: 10.2.2.0/31
      remote: 10.2.2.1/31
    leaf2:
      local: 10.2.2.2/31
      remote: 10.2.2.3/31
    leaf3:
      local: 10.2.2.4/31
      remote: 10.2.2.5/31

leaf1:
  loopback: 10.0.11.1/32
  links:
    host1:
      local: 10.3.1.0/31
      remote: 10.3.1.1/31

leaf2:
  loopback: 10.0.12.1/32
  links:
    host2:
      local: 10.3.2.0/31
      remote: 10.3.2.1/31

leaf3:
  loopback: 10.0.13.1/32
  links:
    host3:
      local: 10.3.3.0/31
      remote: 10.3.3.1/31

host1:
  loopback: 10.0.21.1/32

host2:
  loopback: 10.0.22.1/32

host3:
  loopback: 10.0.23.1/32

# Overlay parameters — used by custom Jinja2 templates
overlay:
  vlans:
    10:
      vni: 10010
      rt: "10:10010"
      subnet: 192.168.10.0/24
  hosts:
    host1: 192.168.10.11/24
    host2: 192.168.10.12/24
    host3: 192.168.10.13/24
