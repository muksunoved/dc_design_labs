provider: clab

defaults:
  device: eos
  devices:
    eos:
      clab:
        image: "ceos:4.34.2.2F"

plugin: [files]

nodes:
  spine1:
    config:
      inline: |
        hostname {{ inventory_hostname }}
        interface Loopback0
          ip address 10.0.1.1/32
          description Spine1-Loopback0
        interface Loopback1
          ip address 10.1.1.1/32
          description Spine1-Loopback1
        interface Ethernet1
          ip address 10.2.1.0/31
          description to-leaf1
        interface Ethernet2
          ip address 10.2.1.2/31
          description to-leaf2
        interface Ethernet3
          ip address 10.2.1.4/31
          description to-leaf3
  spine2:
    config:
      inline: |
        hostname {{ inventory_hostname }}
        interface Loopback0
          ip address 10.0.2.1/32
          description Spine2-Loopback0
        interface Loopback1
          ip address 10.1.2.1/32
          description Spine2-Loopback1
        interface Ethernet1
          ip address 10.2.2.0/31
          description to-leaf1
        interface Ethernet2
          ip address 10.2.2.2/31
          description to-leaf2
        interface Ethernet3
          ip address 10.2.2.4/31
          description to-leaf3
  leaf1:
    config:
      inline: |
        hostname {{ inventory_hostname }}
        interface Loopback0
          ip address 10.0.11.1/32
          description Leaf1-Loopback0
        interface Loopback1
          ip address 10.1.11.1/32
          description Leaf1-Loopback1
        interface Ethernet1
          ip address 10.2.1.1/31
          description to-spine1
        interface Ethernet2
          ip address 10.2.2.1/31
          description to-spine2
  leaf2:
    config:
      inline: |
        hostname {{ inventory_hostname }}
        interface Loopback0
          ip address 10.0.12.1/32
          description Leaf2-Loopback0
        interface Loopback1
          ip address 10.1.12.1/32
          description Leaf2-Loopback1
        interface Ethernet1
          ip address 10.2.1.3/31
          description to-spine1
        interface Ethernet2
          ip address 10.2.2.3/31
          description to-spine2
  leaf3:
    config:
      inline: |
        hostname {{ inventory_hostname }}
        interface Loopback0
          ip address 10.0.13.1/32
          description Leaf3-Loopback0
        interface Loopback1
          ip address 10.1.13.1/32
          description Leaf3-Loopback1
        interface Ethernet1
          ip address 10.2.1.5/31
          description to-spine1
        interface Ethernet2
          ip address 10.2.2.5/31
          description to-spine2

links:
  # Spine1 to all leaves
  - spine1-leaf1
  - spine1-leaf2
  - spine1-leaf3
  # Spine2 to all leaves
  - spine2-leaf1
  - spine2-leaf2
  - spine2-leaf3
