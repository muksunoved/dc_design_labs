
!
ip routing
!
interface Loopback0
  ip address 10.0.11.1/32
!

interface Ethernet1
  no switchport
  ip address 10.2.1.1/31
  no shutdown
!

interface Ethernet2
  no switchport
  ip address 10.2.2.1/31
  no shutdown
!

interface Ethernet3
  no switchport
  ip address 10.3.1.0/31
  no shutdown
!

router bgp 65101
  maximum-paths 4

  neighbor 10.2.1.0 remote-as 65001
  neighbor 10.2.1.0 bfd

  neighbor 10.2.2.0 remote-as 65002
  neighbor 10.2.2.0 bfd

  redistribute connected
!



interface Ethernet1
  bfd interval 100 min_rx 100 multiplier 3
!

interface Ethernet2
  bfd interval 100 min_rx 100 multiplier 3
!

interface Ethernet3
  bfd interval 100 min_rx 100 multiplier 3
!
