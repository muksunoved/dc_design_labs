name: netlab
prefix: "clab"

mgmt:
  network: netlab_mgmt
  ipv4-subnet: 192.168.121.0/24
  # Note: 'start' not validated
topology:
  nodes:
    spine1:
      mgmt-ipv4: 192.168.121.101
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.34.2.2F
      runtime: docker
      group: spine,as65001
    spine2:
      mgmt-ipv4: 192.168.121.102
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.34.2.2F
      runtime: docker
      group: spine,as65002
    leaf1:
      mgmt-ipv4: 192.168.121.103
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.34.2.2F
      runtime: docker
      group: leaf,as65101
    leaf2:
      mgmt-ipv4: 192.168.121.104
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.34.2.2F
      runtime: docker
      group: leaf,as65102
    leaf3:
      mgmt-ipv4: 192.168.121.105
      kind: ceos
      env: {'INTFTYPE': 'et', 'CLAB_MGMT_VRF': 'management'}
      image: ceos:4.34.2.2F
      runtime: docker
      group: leaf,as65103
    host1:
      mgmt-ipv4: 192.168.121.106
      kind: linux
      restart-policy: 'no'
      image: ubuntu:22.04
      runtime: docker
      group: hosts,netlab_no_reload
      binds:
      - host1.sh:/config/startup.sh
      - node_files/-shared-hosts:/etc/hosts:ro
    host2:
      mgmt-ipv4: 192.168.121.107
      kind: linux
      restart-policy: 'no'
      image: ubuntu:22.04
      runtime: docker
      group: hosts,netlab_no_reload
      binds:
      - host2.sh:/config/startup.sh
      - node_files/-shared-hosts:/etc/hosts:ro
    host3:
      mgmt-ipv4: 192.168.121.108
      kind: linux
      restart-policy: 'no'
      image: ubuntu:22.04
      runtime: docker
      group: hosts,netlab_no_reload
      binds:
      - host3.sh:/config/startup.sh
      - node_files/-shared-hosts:/etc/hosts:ro


  links:
  - endpoints:
    - "spine1:et1"
    - "leaf1:et1"
  - endpoints:
    - "spine1:et2"
    - "leaf2:et1"
  - endpoints:
    - "spine1:et3"
    - "leaf3:et1"
  - endpoints:
    - "spine2:et1"
    - "leaf1:et2"
  - endpoints:
    - "spine2:et2"
    - "leaf2:et2"
  - endpoints:
    - "spine2:et3"
    - "leaf3:et2"
  - endpoints:
    - "leaf1:et3"
    - "host1:eth1"
  - endpoints:
    - "leaf2:et3"
    - "host2:eth1"
  - endpoints:
    - "leaf3:et3"
    - "host3:eth1"
