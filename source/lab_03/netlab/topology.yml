# Netlab CLOS Topology: 2 Spine + 3 Leaf with IS-IS
# Provider: containerlab | Device: Arista EOS
# IP addresses are loaded from ip-plan.yml by the ipplan plugin.

defaults:
  device: eos
  provider: clab
  module: [isis]
  devices:
    eos:
      clab:
        image: "ceos:4.34.2.2F"
  outputs:
    graph:
      interface_labels: True
      styles:
        graph:
          splines: line

plugin: [files, ipplan]

nodes:
  spine1:
    config: [spine, isis-timers, bfd]
    graph:
      format:
        image: "spine.png"
        shape: "none"
        labelloc: "b"

  spine2:
    config: [spine, isis-timers, bfd]
    graph:
      format:
        image: "spine.png"
        shape: "none"
        labelloc: "b"

  leaf1:
    config: [leaf, isis-timers, bfd]
    graph:
      format:
        image: "leaf.png"
        shape: "none"
        labelloc: "b"

  leaf2:
    config: [leaf, isis-timers, bfd]
    graph:
      format:
        image: "leaf.png"
        shape: "none"
        labelloc: "b"

  leaf3:
    config: [leaf, isis-timers, bfd]
    graph:
      format:
        image: "leaf.png"
        shape: "none"
        labelloc: "b"
